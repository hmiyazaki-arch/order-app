<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バーコード注文アプリ</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.app { max-width: 480px; margin: 0 auto; background: #ffffff; display: flex; flex-direction: column; min-height: 100vh; }
.header { border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 12px 16px; }
.store-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.datetime { font-size: 12px; color: #6b6b6b; font-family: monospace; margin-top: 2px; }
.header-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }
.offline-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #FAEEDA; color: #854F0B; display: none; }
.offline-badge.show { display: inline-block; }
.btn { font-size: 12px; padding: 4px 14px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #333; cursor: pointer; white-space: nowrap; transition: background 0.2s, border-color 0.2s; }
.manual-btn.on { background: #FAEEDA; border-color: #EF9F27; color: #633806; }
.manual-btn.hidden { display: none; }
.camera-btn.on { background: #E6F1FB; border-color: #378ADD; color: #185FA5; }
.camera-btn.hidden { display: none; }
.header-toast { margin-top: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; text-align: center; display: none; }
.header-toast.show { display: block; }
.header-toast.info { background: #E6F1FB; color: #185FA5; }
.header-toast.success { background: #EAF3DE; color: #3B6D11; }
.camera-area { border-bottom: 0.5px solid rgba(0,0,0,0.12); display: none; background: #1a1a1a; }
.camera-area.show { display: block; }
.camera-wrapper { position: relative; width: 100%; background: #000; }
#reader { width: 100%; }
.camera-hint { text-align: center; padding: 8px; font-size: 12px; color: #6b6b6b; background: #ffffff; }
.camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; }
.camera-overlay.show { display: flex; }
.camera-overlay.success { background: rgba(59, 109, 17, 0.85); }
.camera-overlay.error { background: rgba(163, 45, 45, 0.85); }
.camera-overlay.warning { background: rgba(133, 79, 11, 0.85); }
.camera-overlay-icon { font-size: 48px; }
.camera-overlay-msg { font-size: 16px; font-weight: 500; color: #ffffff; text-align: center; padding: 0 16px; }
.camera-overlay-countdown { font-size: 36px; font-weight: 700; color: #ffffff; }
.scan-area { padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.12); transition: background 0.3s; }
.scan-area.manual-mode { background: #FAEEDA; }
.scan-area.hidden { display: none; }
.scan-mode-label { font-size: 11px; font-weight: 500; margin-bottom: 6px; display: none; }
.scan-mode-label.show { display: block; }
.scan-mode-label.manual { color: #854F0B; }
.scan-mode-label.offline { color: #854F0B; }
.scan-input-row { display: flex; gap: 8px; }
.scan-input { flex: 1; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.18); border-radius: 10px; font-size: 14px; color: #1a1a1a; background: #ffffff; outline: none; transition: border-color 0.15s; }
.scan-input:focus { border-color: #378ADD; }
.scan-input.scanning { border-color: #1D9E75; background: #E1F5EE; }
.scan-input.manual-input { border-color: rgba(0,0,0,0.18); font-size: 11px; }
.submit-btn { padding: 0 16px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #333; font-size: 13px; cursor: pointer; display: none; }
.submit-btn.show { display: block; }
.scan-toast { margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: none; line-height: 1.5; }
.scan-toast.show { display: block; }
.scan-toast.success { background: #EAF3DE; color: #3B6D11; }
.scan-toast.warning { background: #FAEEDA; color: #854F0B; }
.scan-toast.danger { background: #FCEBEB; color: #A32D2D; }
.scan-toast.info { background: #E6F1FB; color: #185FA5; }
.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.12); }
.tab { flex: 1; padding: 10px 6px; font-size: 13px; color: #6b6b6b; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; user-select: none; }
.tab-badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 10px; background: #f0f0f0; color: #6b6b6b; margin-left: 4px; }
.tab.pending-tab.active { color: #185FA5; font-weight: 500; border-bottom-color: #185FA5; }
.tab.pending-tab.active .tab-badge { background: #185FA5; color: #ffffff; }
.tab.done-tab.active { color: #3B6D11; font-weight: 500; border-bottom-color: #3B6D11; }
.tab.done-tab.active .tab-badge { background: #3B6D11; color: #ffffff; }
.tab.error-tab.active { color: #A32D2D; font-weight: 500; border-bottom-color: #A32D2D; }
.tab.error-tab.active .tab-badge { background: #A32D2D; color: #ffffff; }
.tab-badge.has-error { background: #FCEBEB; color: #A32D2D; }
.tab-content { display: none; padding: 12px 16px 16px; }
.tab-content.active { display: block; }
.orders-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
.order-card { background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.3s ease; }
.order-card.highlight { border-color: #1D9E75; background: #E1F5EE; }
.order-card.queued { border-color: #EF9F27; background: #FAEEDA; }
.order-card.removing { opacity: 0; transform: scale(0.85); }
.order-card.done { background: #EAF3DE; border-color: rgba(0,0,0,0.08); }
.order-card.reverting { opacity: 0.5; }
.order-id { font-size: 14px; font-weight: 500; color: #1a1a1a; font-family: monospace; letter-spacing: 0.03em; }
.order-id.done { color: #3B6D11; }
.order-status { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #ffffff; color: #6b6b6b; }
.order-status.processing { background: #E6F1FB; color: #185FA5; }
.order-status.queued { background: #FAEEDA; color: #854F0B; }
.revert-btn { font-size: 10px; padding: 2px 7px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.2); background: #ffffff; color: #555; cursor: pointer; }
.revert-btn:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.revert-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.error-list { display: flex; flex-direction: column; gap: 8px; }
.error-card { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: 8px; padding: 10px 12px; }
.error-id { font-size: 14px; font-weight: 500; font-family: monospace; color: #791F1F; margin-bottom: 6px; }
.error-message { font-size: 12px; color: #A32D2D; margin-bottom: 3px; line-height: 1.4; }
.error-time { font-size: 11px; color: #C06060; font-family: monospace; margin-bottom: 8px; }
.error-card-footer { display: flex; justify-content: flex-end; gap: 6px; }
.error-dismiss { font-size: 11px; padding: 3px 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #555; cursor: pointer; transition: all 0.15s; }
.error-dismiss:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.error-retry { font-size: 11px; padding: 3px 12px; border-radius: 8px; border: 1px solid #378ADD; background: #ffffff; color: #185FA5; cursor: pointer; transition: all 0.15s; }
.error-retry:hover { background: #E6F1FB; }
.error-retry:disabled { opacity: 0.4; cursor: not-allowed; }
.clear-btn { font-size: 12px; padding: 4px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: transparent; color: #555; cursor: pointer; margin-bottom: 10px; }
.empty-state { text-align: center; padding: 32px 20px; color: #6b6b6b; font-size: 13px; }
.offline-bar { padding: 10px 16px; background: #FAEEDA; border-top: 0.5px solid #FAC775; display: none; font-size: 12px; color: #854F0B; }
.offline-bar.show { display: block; }
.offline-bar-text { margin-bottom: 2px; }
.offline-bar-sub { font-size: 11px; color: #BA7517; }
.flush-result { padding: 10px 16px; font-size: 12px; display: none; border-top: 0.5px solid rgba(0,0,0,0.08); }
.flush-result.show { display: block; }
.flush-result.success { background: #EAF3DE; color: #3B6D11; }
.flush-result.partial { background: #FAEEDA; color: #854F0B; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="store-name">店舗: <span id="storeCode">ST-001</span></div>
    <div class="datetime" id="datetime"></div>
    <div class="header-actions">
      <span class="offline-badge" id="offlineBadge">オフライン</span>
      <button class="btn" onclick="refreshOrders()">更新</button>
      <button class="btn camera-btn" id="cameraBtnHeader" onclick="toggleCamera()">カメラ</button>
      <button class="btn manual-btn" id="manualToggleBtn" onclick="toggleManualMode()">手入力</button>
    </div>
    <div class="header-toast" id="headerToast"></div>
  </div>

  <div class="camera-area" id="cameraArea">
    <div class="camera-wrapper">
      <div id="reader"></div>
      <div class="camera-overlay" id="cameraOverlay">
        <div class="camera-overlay-icon" id="cameraOverlayIcon"></div>
        <div class="camera-overlay-msg" id="cameraOverlayMsg"></div>
        <div class="camera-overlay-countdown" id="cameraOverlayCountdown"></div>
      </div>
    </div>
    <div class="camera-hint">QRコードをカメラに向けてください</div>
  </div>

  <div class="scan-area" id="scanArea">
    <div class="scan-mode-label" id="scanModeLabel"></div>
    <div class="scan-input-row">
      <input class="scan-input" id="scanInput" type="text" placeholder="QRコードをスキャンしてください" autocomplete="off" autofocus />
      <button class="submit-btn" id="submitBtn" onclick="submitManual()">送信</button>
    </div>
    <div class="scan-toast" id="scanToast"></div>
  </div>

  <div class="tabs">
    <div class="tab pending-tab active" id="tab-pending" onclick="switchTab('pending')">呼出中 <span class="tab-badge" id="badge-pending">6</span></div>
    <div class="tab done-tab" id="tab-done" onclick="switchTab('done')">完了 <span class="tab-badge" id="badge-done">0</span></div>
    <div class="tab error-tab" id="tab-error" onclick="switchTab('error')">エラー <span class="tab-badge" id="badge-error">0</span></div>
  </div>
  <div class="tab-content active" id="content-pending"><div class="orders-grid" id="orderList"></div></div>
  <div class="tab-content" id="content-done"><div class="orders-grid" id="doneList"></div></div>
  <div class="tab-content" id="content-error">
    <div id="errorActions" style="display:none;"><button class="clear-btn" onclick="clearAllErrors()">すべて消去</button></div>
    <div class="error-list" id="errorList"></div>
  </div>
  <div class="offline-bar" id="offlineBar">
    <div class="offline-bar-text" id="offlineBarText"></div>
    <div class="offline-bar-sub" id="offlineBarSub"></div>
  </div>
  <div class="flush-result" id="flushResult"></div>
</div>

<script>
var DUPLICATE_MS=3000, SCAN_DELAY=300;
var QR_RE=/^\d{1,20}$/;
var CALL_RE=/^[A-Za-z]\d+$/;
var RETRYABLE_CODES=[600,900,'network'];
var PH_DEFAULT='QRコードをスキャンしてください';
var PH_MANUAL='呼出番号を入力してください。（例：S001、M001）';
var PH_OFFLINE='呼出番号を手入力してください。（例：S001、M001）';

var orders=[
  {orderId:'1',callNumber:'S001'},
  {orderId:'2',callNumber:'S002'},
  {orderId:'3',callNumber:'M001'},
  {orderId:'4',callNumber:'M002'},
  {orderId:'5',callNumber:'S003'},
  {orderId:'6',callNumber:'M003'}
];
var doneOrders=[],errorItems=[],offlineQueue=[],recentScans={},scanTimer=null,processing=false,isOnline=navigator.onLine,isManualMode=false,currentTab='pending';
var html5QrCode=null, isCameraOn=false;

var ERROR_MSGS={300:'該当のIDが存在しません。',500:'すでに処理済みの注文です',501:'返品済みの注文です',600:'読取エラー。再度スキャンしてください',900:'サーバーに接続できません。しばらく待ってから再試行してください',network:'通信が途切れました。再試行してください'};

function now(){var n=new Date();var p=function(v){return String(v).padStart(2,'0');};return p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());}
function updateDatetime(){var n=new Date();var p=function(v){return String(v).padStart(2,'0');};document.getElementById('datetime').textContent=n.getFullYear()+'/'+p(n.getMonth()+1)+'/'+p(n.getDate())+'  '+p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());}

var CAMERA_FREEZE_SEC = 5;
var cameraFreezeTimer = null;
var cameraFreezing = false;

function freezeCamera(type, msg) {
  if(!isCameraOn) return;
  cameraFreezing = true;
  var overlay = document.getElementById('cameraOverlay');
  var icon = document.getElementById('cameraOverlayIcon');
  var msgEl = document.getElementById('cameraOverlayMsg');
  var countdown = document.getElementById('cameraOverlayCountdown');
  var icons = {success:'✅', error:'❌', warning:'⚠️'};
  overlay.className = 'camera-overlay show ' + type;
  icon.textContent = icons[type] || '';
  msgEl.textContent = msg;
  var sec = CAMERA_FREEZE_SEC;
  countdown.textContent = sec;
  clearInterval(cameraFreezeTimer);
  cameraFreezeTimer = setInterval(function(){
    sec--;
    countdown.textContent = sec;
    if(sec <= 0){
      clearInterval(cameraFreezeTimer);
      overlay.className = 'camera-overlay';
      cameraFreezing = false;
    }
  }, 1000);
}

function toggleCamera(){if(isCameraOn){stopCamera();}else{startCamera();}}

function startCamera(){
  var cameraArea=document.getElementById('cameraArea');
  var cameraBtn=document.getElementById('cameraBtnHeader');
  cameraArea.classList.add('show');
  cameraBtn.textContent='カメラOFF';
  cameraBtn.classList.add('on');
  isCameraOn=true;
  // カメラON時は入力欄を非表示
  document.getElementById('scanArea').classList.add('hidden');
  html5QrCode=new Html5Qrcode('reader');
  html5QrCode.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:220,height:220}},
    function(decodedText){onScanComplete(decodedText);},
    function(){}
  ).catch(function(){
    showHeaderToast('カメラの起動に失敗しました。HTTPSが必要です。','info');
    stopCamera();
  });
}

function stopCamera(){
  var cameraArea=document.getElementById('cameraArea');
  var cameraBtn=document.getElementById('cameraBtnHeader');
  if(html5QrCode&&isCameraOn){html5QrCode.stop().then(function(){html5QrCode.clear();html5QrCode=null;}).catch(function(){});}
  cameraArea.classList.remove('show');
  cameraBtn.textContent='カメラ';
  cameraBtn.classList.remove('on');
  isCameraOn=false;
  cameraFreezing=false;
  clearInterval(cameraFreezeTimer);
  var overlay=document.getElementById('cameraOverlay');
  if(overlay)overlay.className='camera-overlay';
  // カメラOFF時は入力欄を再表示
  if(currentTab==='pending') document.getElementById('scanArea').classList.remove('hidden');
}

function parseInput(raw,manualMode){
  var val=raw.trim().toUpperCase();
  if(!manualMode){
    if(!QR_RE.test(val)){
      if(!/^\d+$/.test(val))return {valid:false,reason:'QRコードの読取に失敗しました。再度スキャンしてください。'};
      return {valid:false,reason:'オーダーIDが不正です（最大20桁）。'};
    }
    var found=orders.find(function(o){return o.orderId===val;});
    return {valid:true,orderId:val,callNumber:found?found.callNumber:null};
  }else{
    if(!CALL_RE.test(val))return {valid:false,reason:'呼出番号の形式が正しくありません。\n例：S001、M001'};
    var found=orders.find(function(o){return o.callNumber===val;});
    if(!found)return {valid:false,reason:'呼出番号 '+val+' は一覧に存在しません。'};
    return {valid:true,orderId:found.orderId,callNumber:found.callNumber};
  }
}

function switchTab(tab){
  currentTab=tab;
  ['pending','done','error'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('content-'+t).classList.toggle('active',t===tab);
  });
  var isPending=tab==='pending';
  document.getElementById('scanArea').classList.toggle('hidden',!isPending);
  document.getElementById('manualToggleBtn').classList.toggle('hidden',!isPending);
  document.getElementById('cameraBtnHeader').classList.toggle('hidden',!isPending);
  if(!isPending&&isCameraOn)stopCamera();
  if(isPending)document.getElementById('scanInput').focus();
}

function renderOrders(){
  var l=document.getElementById('orderList');
  var queuedIds=offlineQueue.map(function(q){return q.orderId;});
  if(orders.length===0){l.innerHTML='<div class="empty-state" style="grid-column:1/-1;">現在呼出中のオーダーはありません。</div>';document.getElementById('badge-pending').textContent=0;return;}
  l.innerHTML=orders.map(function(o){
    var isQueued=queuedIds.indexOf(o.orderId)>=0;
    return '<div class="order-card'+(isQueued?' queued':'')+'" id="card-'+o.orderId+'"><div class="order-id">'+o.callNumber+'</div><div class="order-status'+(isQueued?' queued':'')+'" id="status-'+o.orderId+'">'+(isQueued?'送信待ち':'呼出中')+'</div></div>';
  }).join('');
  document.getElementById('badge-pending').textContent=orders.length;
}

function renderDone(){
  var l=document.getElementById('doneList');
  if(doneOrders.length===0){l.innerHTML='<div class="empty-state" style="grid-column:1/-1;">完了した注文はありません</div>';document.getElementById('badge-done').textContent=0;return;}
  l.innerHTML=doneOrders.map(function(o){return '<div class="order-card done" id="done-card-'+o.orderId+'"><div class="order-id done">'+o.callNumber+'</div><div class="order-status" style="background:#EAF3DE;color:#3B6D11;">完了</div><button class="revert-btn" id="revert-btn-'+o.orderId+'" onclick="revertOrder(\''+o.orderId+'\')">戻す</button></div>';}).join('');
  document.getElementById('badge-done').textContent=doneOrders.length;
}

function revertOrder(orderId){
  var card=document.getElementById('done-card-'+orderId),btn=document.getElementById('revert-btn-'+orderId);
  if(!card||!btn)return;
  btn.disabled=true;card.classList.add('reverting');
  mockRevertApiCall(orderId).then(function(rc){
    if(rc===100){card.classList.add('removing');setTimeout(function(){var o=doneOrders.find(function(d){return d.orderId===orderId;});doneOrders=doneOrders.filter(function(d){return d.orderId!==orderId;});if(o)orders.push(o);renderDone();renderOrders();showScanToast((o?o.callNumber:orderId)+' を呼出中に戻しました','info');},300);}
    else{card.classList.remove('reverting');btn.disabled=false;showScanToast('戻し処理に失敗しました','danger');}
  }).catch(function(){card.classList.remove('reverting');btn.disabled=false;showScanToast('通信エラー。再試行してください','danger');});
}
function mockRevertApiCall(orderId){return new Promise(function(res){setTimeout(function(){res(Math.random()<0.9?100:900);},400);});}

function renderErrors(){
  var count=errorItems.length;
  document.getElementById('badge-error').textContent=count;
  document.getElementById('badge-error').className=count>0?'tab-badge has-error':'tab-badge';
  document.getElementById('errorActions').style.display=count>0?'block':'none';
  var el=document.getElementById('errorList');
  if(errorItems.length===0){el.innerHTML='<div class="empty-state">エラーはありません</div>';return;}
  el.innerHTML=errorItems.map(function(e,i){
    var canRetry=RETRYABLE_CODES.indexOf(e.code)>=0;
    var footer='<div class="error-card-footer">';
    if(canRetry)footer+='<button class="error-retry" id="retry-btn-'+i+'" onclick="retryError('+i+')">再試行</button>';
    footer+='<button class="error-dismiss" onclick="dismissError('+i+')">消去</button></div>';
    return '<div class="error-card" id="error-card-'+i+'"><div class="error-id">'+e.callNumber+'</div><div class="error-message">'+e.message+'</div><div class="error-time">発生時刻: '+e.time+'</div>'+footer+'</div>';
  }).join('');
}

function addError(callNumber,code,orderId){errorItems.push({callNumber:callNumber,code:code,orderId:orderId,message:ERROR_MSGS[code]||'不明なエラーが発生しました',time:now()});renderErrors();}
function dismissError(i){errorItems.splice(i,1);renderErrors();}
function clearAllErrors(){errorItems=[];renderErrors();}

function retryError(i){
  var e=errorItems[i];if(!e)return;
  var btn=document.getElementById('retry-btn-'+i);if(btn)btn.disabled=true;
  mockApiCall(e.orderId).then(function(rc){
    if(rc===100){errorItems.splice(i,1);var o=orders.find(function(o){return o.orderId===e.orderId;});orders=orders.filter(function(o){return o.orderId!==e.orderId;});if(o)doneOrders.push(o);renderErrors();renderOrders();renderDone();showScanToast('完了: '+e.callNumber,'success');}
    else{errorItems[i].code=rc;errorItems[i].message=ERROR_MSGS[rc]||'不明なエラーが発生しました';errorItems[i].time=now();renderErrors();showScanToast(e.callNumber+' の再試行に失敗しました','danger');}
  }).catch(function(){errorItems[i].code='network';errorItems[i].message=ERROR_MSGS['network'];errorItems[i].time=now();renderErrors();showScanToast('通信エラー。再試行してください','danger');});
}

function showHeaderToast(msg,type){var t=document.getElementById('headerToast');t.textContent=msg;t.className='header-toast show '+type;clearTimeout(t._timer);t._timer=setTimeout(function(){t.className='header-toast';},3000);}
function showScanToast(msg,type){var t=document.getElementById('scanToast');t.textContent=msg;t.className='scan-toast show '+type;clearTimeout(t._timer);t._timer=setTimeout(function(){t.className='scan-toast';},3000);}

function updateOfflineBar(){
  var bar=document.getElementById('offlineBar'),text=document.getElementById('offlineBarText'),sub=document.getElementById('offlineBarSub');
  if(!isOnline&&offlineQueue.length>0){text.textContent='オフライン中 — '+offlineQueue.length+'件が送信待ちです';sub.textContent='ネットワーク復帰後に自動で送信されます';bar.classList.add('show');}
  else if(!isOnline){text.textContent='オフライン中 — スキャンはキューに保存されます';sub.textContent='ネットワーク復帰後に自動で送信されます';bar.classList.add('show');}
  else{bar.classList.remove('show');}
}

function showFlushResult(success,failed){
  var el=document.getElementById('flushResult');
  if(success===0&&failed===0){el.classList.remove('show');return;}
  if(failed===0){el.textContent='オンライン復帰 — '+success+'件の送信が完了しました';el.className='flush-result show success';}
  else{el.textContent='オンライン復帰 — '+success+'件完了 / '+failed+'件はエラーになりました';el.className='flush-result show partial';}
  clearTimeout(el._timer);el._timer=setTimeout(function(){el.classList.remove('show');},5000);
}

function toggleManualMode(){isManualMode=!isManualMode;applyModeUI();showHeaderToast(isManualMode?'手入力をONにしました':'手入力をOFFにしました','info');}

function applyModeUI(){
  var scanArea=document.getElementById('scanArea'),input=document.getElementById('scanInput'),btn=document.getElementById('submitBtn'),label=document.getElementById('scanModeLabel'),toggleBtn=document.getElementById('manualToggleBtn');
  var showManual=isManualMode||!isOnline;
  if(showManual){
    scanArea.classList.add('manual-mode');input.classList.add('manual-input');btn.classList.add('show');
    if(!isOnline){label.textContent='手入力（オフライン）';label.className='scan-mode-label show offline';input.placeholder=PH_OFFLINE;}
    else{label.textContent='手入力（リーダー・手入力 両対応）';label.className='scan-mode-label show manual';input.placeholder=PH_MANUAL;}
  }else{
    scanArea.classList.remove('manual-mode');input.classList.remove('manual-input');btn.classList.remove('show');
    label.className='scan-mode-label';input.placeholder=PH_DEFAULT;
  }
  isManualMode?toggleBtn.classList.add('on'):toggleBtn.classList.remove('on');
}

function submitManual(){var input=document.getElementById('scanInput');var v=input.value.trim();if(v)onScanComplete(v);}

function updateOnlineStatus(){
  isOnline=navigator.onLine;
  document.getElementById('offlineBadge').classList.toggle('show',!isOnline);
  applyModeUI();if(isOnline)flushQueue();updateOfflineBar();
}

function flushQueue(){
  if(!offlineQueue.length)return;
  var total=offlineQueue.length;
  showHeaderToast('オンライン復帰。'+total+'件を送信中...','info');
  var items=offlineQueue.slice();offlineQueue=[];updateOfflineBar();renderOrders();
  var success=0,failed=0,idx=0;
  function next(){
    if(idx>=items.length){showFlushResult(success,failed);return;}
    var item=items[idx++];
    mockApiCall(item.orderId).then(function(rc){
      if(rc===100){var o=orders.find(function(o){return o.orderId===item.orderId;});orders=orders.filter(function(o){return o.orderId!==item.orderId;});if(o)doneOrders.push(o);success++;renderOrders();renderDone();}
      else{addError(item.callNumber,rc,item.orderId);failed++;}
      setTimeout(next,200);
    }).catch(function(){addError(item.callNumber,'network',item.orderId);failed++;setTimeout(next,200);});
  }
  next();
}

function isDuplicate(orderId){var n=Date.now();if(recentScans[orderId]&&n-recentScans[orderId]<DUPLICATE_MS)return true;recentScans[orderId]=n;return false;}

function processOrder(orderId,callNumber,fromQueue){
  // 重複チェックを最初に行い、重複の場合は完全に無視（トーストも表示しない）
  if(!fromQueue&&isDuplicate(orderId)){
    return Promise.resolve();
  }
  // ============================================================
  // callNumber フォールバック（コメントアウト中）
  // callNumberは一覧取得APIから必ず取得できる前提のため不要
  // 復帰させる場合はコメントを外してください
  // var displayName = callNumber || orderId;
  // ============================================================
  var card=document.getElementById('card-'+orderId),statusEl=document.getElementById('status-'+orderId);
  if(card){card.classList.add('highlight');if(statusEl){statusEl.textContent='処理中...';statusEl.className='order-status processing';}}
  if(!isOnline){
    if(!fromQueue){
      if(!orders.find(function(o){return o.orderId===orderId;})){if(card)card.classList.remove('highlight');showScanToast('該当のIDが存在しません。\nキューへの登録をスキップしました。','danger');return Promise.resolve();}
      if(offlineQueue.find(function(q){return q.orderId===orderId;})){if(card){card.classList.remove('highlight');if(statusEl){statusEl.textContent='送信待ち';statusEl.className='order-status queued';}}showScanToast((callNumber||orderId)+' はすでに送信待ちです。\nネットワーク復帰後に自動送信されます。','warning');return Promise.resolve();}
      offlineQueue.push({orderId:orderId,callNumber:callNumber});
    }
    updateOfflineBar();
    if(card){card.classList.remove('highlight');card.classList.add('queued');if(statusEl){statusEl.textContent='送信待ち';statusEl.className='order-status queued';}}
    showScanToast((callNumber||orderId)+' をキューに追加しました。\nネットワーク復帰後に自動送信されます。','warning');
    return Promise.resolve();
  }
  return mockApiCall(orderId).then(function(rc){handleResult(orderId,callNumber,rc);}).catch(function(){
    if(card){card.classList.remove('highlight');if(statusEl){statusEl.textContent='呼出中';statusEl.className='order-status';}}
    addError(callNumber||orderId,'network',orderId);showScanToast('通信エラー','danger');
  });
}

function mockApiCall(orderId){
  return new Promise(function(res){
    setTimeout(function(){
      if(!orders.find(function(o){return o.orderId===orderId;})){res(300);return;}
      var r=Math.random();
      if(r<0.55)res(100);else if(r<0.65)res(500);else if(r<0.72)res(501);else if(r<0.80)res(300);else if(r<0.90)res(600);else res(900);
    },350);
  });
}

function handleResult(orderId,callNumber,rc){
  var card=document.getElementById('card-'+orderId),statusEl=document.getElementById('status-'+orderId);
  if(rc===100){
    if(card){card.classList.add('removing');setTimeout(function(){var o=orders.find(function(o){return o.orderId===orderId;});orders=orders.filter(function(o){return o.orderId!==orderId;});if(o)doneOrders.push(o);renderOrders();renderDone();},300);}
    showScanToast('完了: '+(callNumber||orderId),'success');
    if(isCameraOn) freezeCamera('success','完了: '+(callNumber||orderId));
  }else{
    if(card){card.classList.remove('highlight');if(statusEl){statusEl.textContent='呼出中';statusEl.className='order-status';}}
    addError(callNumber||orderId,rc,orderId);
    var msgs={300:'該当のIDが存在しません。',500:'処理済み: '+(callNumber||orderId),501:'返品済み: '+(callNumber||orderId),600:'読取エラー',900:'サーバーエラー'};
    var types={300:'warning',500:'warning',501:'warning',600:'danger',900:'danger'};
    var overlayTypes={300:'error',500:'warning',501:'warning',600:'error',900:'error'};
    showScanToast(msgs[rc]||'エラー: '+rc,types[rc]||'danger');
    if(isCameraOn) freezeCamera(overlayTypes[rc]||'error', msgs[rc]||'エラー');
  }
}

function onScanComplete(raw){
  if(!raw||processing)return;
  if(isCameraOn&&cameraFreezing)return;
  // カメラ連続読取り時: 処理中は静かに無視
  var manualMode=isManualMode||!isOnline;
  var parsed=parseInput(raw,manualMode);
  if(!parsed.valid){showScanToast(parsed.reason,'danger');var input=document.getElementById('scanInput');input.value='';input.focus();return;}
  processing=true;
  var input=document.getElementById('scanInput');
  input.classList.add('scanning');
  processOrder(parsed.orderId,parsed.callNumber,false).then(function(){
    processing=false;input.value='';input.classList.remove('scanning');input.focus();
  });
}

function refreshOrders(){
  orders=[{orderId:'1',callNumber:'S001'},{orderId:'2',callNumber:'S002'},{orderId:'3',callNumber:'M001'},{orderId:'4',callNumber:'M002'},{orderId:'5',callNumber:'S003'},{orderId:'6',callNumber:'M003'}];
  doneOrders=[];errorItems=[];offlineQueue=[];
  renderOrders();renderDone();renderErrors();switchTab('pending');updateOfflineBar();
  showHeaderToast('一覧を更新しました','info');
}
