<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バーコード注文アプリ</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.app { max-width: 480px; margin: 0 auto; background: #ffffff; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
.header { border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 12px 16px; flex-shrink: 0; }
.store-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.datetime { font-size: 12px; color: #6b6b6b; font-family: monospace; margin-top: 2px; }
.header-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }
.offline-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #FAEEDA; color: #854F0B; display: none; }
.offline-badge.show { display: inline-block; }
.ws-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: none; }
.ws-badge.show { display: inline-block; }
.ws-badge.connecting { background: #FAEEDA; color: #854F0B; }
.ws-badge.connected { background: #EAF3DE; color: #3B6D11; }
.ws-badge.disconnected { background: #FCEBEB; color: #A32D2D; }
.btn { font-size: 12px; padding: 4px 14px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #333; cursor: pointer; white-space: nowrap; transition: background 0.2s, border-color 0.2s; }
.manual-btn.on { background: #FAEEDA; border-color: #EF9F27; color: #633806; }
.manual-btn.hidden { display: none; }
.camera-btn.on { background: #E6F1FB; border-color: #378ADD; color: #185FA5; }
.camera-btn.hidden { display: none; }
.barcode-btn.on { background: #EAF3DE; border-color: #5A9E2F; color: #3B6D11; }
.barcode-btn.hidden { display: none; }
#refreshBtn.hidden { display: none; }
.header-toast { margin-top: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; text-align: center; display: none; }
.header-toast.show { display: block; }
.header-toast.info { background: #E6F1FB; color: #185FA5; }
.header-toast.success { background: #EAF3DE; color: #3B6D11; }
.camera-area { border-bottom: 0.5px solid rgba(0,0,0,0.12); display: none; background: #1a1a1a; flex-shrink: 0; }
.camera-area.show { display: block; }
.camera-wrapper { position: relative; width: 100%; background: #000; height: 260px; overflow: hidden; }
#reader { width: 100%; }
#reader video { object-fit: cover; width: 100% !important; height: 260px !important; }
#reader > div { display: flex !important; align-items: center !important; justify-content: center !important; }
/* html5-qrcodeライブラリの不要UIを非表示 */
#reader__dashboard { display: none !important; }
#reader__status_span { display: none !important; }
#reader__header_message { display: none !important; }
#reader__scan_region > div[style*="Scanner"] { display: none !important; }
#reader video + div { display: none !important; }
#reader__scan_region { overflow: hidden; }
/* Scanner pausedテキストを非表示 */
#reader__scan_region > div[style*="z-index: 1"] { display: none !important; }
#reader { color: transparent !important; }
#reader video, #reader canvas { color: initial !important; }
#reader__scan_region > br { display: none !important; }
#reader__scan_region > span { display: none !important; }
#reader__scan_region > div:not(#qr-shaded-region) { display: none !important; }
/* 暗いオーバーレイを非表示 */
#qr-shaded-region { display: none !important; }
/* html5-qrcodeの白いコーナー枠を非表示 */
#qr-shaded-region > div { display: none !important; }
#reader__scan_region img { display: none !important; }
#reader__scan_region svg { display: none !important; }
#reader__scan_region > div { border: none !important; box-shadow: none !important; }
/* カメラwrapper上に四隅コーナーマークをCSSで描画 */
.camera-corner { position: absolute; width: 24px; height: 24px; border-color: #ffffff; border-style: solid; z-index: 20; }
.camera-corner.tl { top: 12px; left: 12px; border-width: 3px 0 0 3px; }
.camera-corner.tr { top: 12px; right: 12px; border-width: 3px 3px 0 0; }
.camera-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 3px 3px; }
.camera-corner.br { bottom: 12px; right: 12px; border-width: 0 3px 3px 0; }
.camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; }
.camera-overlay.show { display: flex; }
.camera-overlay.success { background: rgba(59,109,17,0.85); }
.camera-overlay.error { background: rgba(163,45,45,0.85); }
.camera-overlay.warning { background: rgba(133,79,11,0.85); }
.camera-overlay-icon { font-size: 48px; }
.camera-overlay-msg { font-size: 16px; font-weight: 500; color: #ffffff; text-align: center; padding: 0 16px; }
.camera-hint { text-align: center; padding: 8px; font-size: 12px; color: #6b6b6b; background: #ffffff; }
.scan-area { padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.12); transition: background 0.3s; flex-shrink: 0; }
.scan-area.manual-mode { background: #FAEEDA; }
.scan-area.hidden { display: none; }
.scan-mode-label { font-size: 11px; font-weight: 500; margin-bottom: 6px; display: none; }
.scan-mode-label.show { display: block; }
.scan-mode-label.manual { color: #854F0B; }
.scan-mode-label.offline { color: #854F0B; }
.scan-input-row { display: flex; gap: 8px; }
.scan-input { flex: 1; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.18); border-radius: 10px; font-size: 14px; color: #1a1a1a; background: #ffffff; outline: none; transition: border-color 0.15s; }
.scan-input:focus { border-color: #378ADD; }
.scan-input.manual-input { border-color: rgba(0,0,0,0.18); font-size: 11px; }
.submit-btn { padding: 0 16px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #333; font-size: 13px; cursor: pointer; display: none; }
.submit-btn.show { display: block; }
.scan-toast { margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: none; line-height: 1.5; }
.scan-toast.show { display: block; }
.scan-toast.success { background: #EAF3DE; color: #3B6D11; }
.scan-toast.warning { background: #FAEEDA; color: #854F0B; }
.scan-toast.danger { background: #FCEBEB; color: #A32D2D; }
.scan-toast.info { background: #E6F1FB; color: #185FA5; }
.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }
.tab { flex: 1; padding: 10px 6px; font-size: 13px; color: #6b6b6b; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; user-select: none; }
.tab-badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 10px; background: #f0f0f0; color: #6b6b6b; margin-left: 4px; }
.tab.pending-tab.active { color: #185FA5; font-weight: 500; border-bottom-color: #185FA5; }
.tab.pending-tab.active .tab-badge { background: #185FA5; color: #ffffff; }
.tab.done-tab.active { color: #3B6D11; font-weight: 500; border-bottom-color: #3B6D11; }
.tab.done-tab.active .tab-badge { background: #3B6D11; color: #ffffff; }
.tab.error-tab.active { color: #A32D2D; font-weight: 500; border-bottom-color: #A32D2D; }
.tab.error-tab.active .tab-badge { background: #A32D2D; color: #ffffff; }
.tab-badge.has-error { background: #FCEBEB; color: #A32D2D; }
.tab-content { display: none; padding: 12px 16px 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.tab-content.active { display: block; }
.orders-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
.order-card { background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.3s ease; }
.order-card.highlight { border-color: #1D9E75; background: #E1F5EE; }
.order-card.queued { border-color: #EF9F27; background: #FAEEDA; }
.order-card.removing { opacity: 0; transform: scale(0.85); }
.order-card.done { background: #EAF3DE; border-color: rgba(0,0,0,0.08); }
.order-card.reverting { opacity: 0.5; }
.order-id { font-size: 14px; font-weight: 500; color: #1a1a1a; font-family: monospace; letter-spacing: 0.03em; }
.order-id.done { color: #3B6D11; }
.order-status { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #ffffff; color: #6b6b6b; }
.order-status.processing { background: #E6F1FB; color: #185FA5; }
.order-status.queued { background: #FAEEDA; color: #854F0B; }
.revert-btn { font-size: 10px; padding: 2px 7px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.2); background: #ffffff; color: #555; cursor: pointer; }
.revert-btn:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.revert-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.error-list { display: flex; flex-direction: column; gap: 8px; }
.error-card { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: 8px; padding: 10px 12px; }
.error-id { font-size: 11px; font-weight: 500; font-family: monospace; color: #791F1F; margin-bottom: 6px; }
.error-message { font-size: 12px; color: #A32D2D; margin-bottom: 3px; line-height: 1.4; }
.error-time { font-size: 11px; color: #C06060; font-family: monospace; margin-bottom: 8px; }
.error-card-footer { display: flex; justify-content: flex-end; gap: 6px; }
.error-dismiss { font-size: 11px; padding: 3px 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.18); background: #ffffff; color: #555; cursor: pointer; transition: all 0.15s; }
.error-dismiss:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.error-retry { font-size: 11px; padding: 3px 12px; border-radius: 8px; border: 1px solid #378ADD; background: #ffffff; color: #185FA5; cursor: pointer; transition: all 0.15s; }
.error-retry:hover { background: #E6F1FB; }
.error-retry:disabled { opacity: 0.4; cursor: not-allowed; }
.clear-btn { font-size: 12px; padding: 4px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: transparent; color: #555; cursor: pointer; margin-bottom: 10px; }
.empty-state { text-align: center; padding: 32px 20px; color: #6b6b6b; font-size: 13px; }
.offline-bar { padding: 10px 16px; background: #FAEEDA; border-top: 0.5px solid #FAC775; display: none; font-size: 12px; color: #854F0B; flex-shrink: 0; }
.offline-bar.show { display: block; }
.offline-bar-text { margin-bottom: 2px; }
.offline-bar-sub { font-size: 11px; color: #BA7517; }
.flush-result { padding: 10px 16px; font-size: 12px; display: none; border-top: 0.5px solid rgba(0,0,0,0.08); flex-shrink: 0; }
.flush-result.show { display: block; }
.flush-result.success { background: #EAF3DE; color: #3B6D11; }
.flush-result.partial { background: #FAEEDA; color: #854F0B; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="store-name">店舗: <span id="storeCode">ST-001</span></div>
    <div class="datetime" id="datetime"></div>
    <div class="header-actions">
      <span class="offline-badge" id="offlineBadge">オフライン</span>
      <span class="ws-badge" id="wsBadge"></span>
      <button class="btn" id="refreshBtn" onclick="refreshOrders()">更新</button>
      <button class="btn camera-btn" id="cameraBtnHeader" onclick="toggleCamera()">カメラ</button>
      <button class="btn barcode-btn" id="barcodeBtnHeader" onclick="toggleBarcodeMode()">バーコード</button>
      <button class="btn manual-btn" id="manualToggleBtn" onclick="toggleManualMode()">手入力</button>
    </div>
    <div class="header-toast" id="headerToast"></div>
  </div>

  <div class="camera-area" id="cameraArea">
    <div class="camera-wrapper">
      <div id="reader"></div>
      <canvas id="qrFocusCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
      <!-- 四隅コーナーマーク -->
      <div class="camera-corner tl"></div>
      <div class="camera-corner tr"></div>
      <div class="camera-corner bl"></div>
      <div class="camera-corner br"></div>
      <div class="camera-overlay" id="cameraOverlay">
        <div class="camera-overlay-icon" id="cameraOverlayIcon"></div>
        <div class="camera-overlay-msg" id="cameraOverlayMsg"></div>
      </div>
    </div>
    <div class="camera-hint">QRコードをカメラに向けてください</div>
  </div>

  <div class="scan-area" id="scanArea">
    <div class="scan-mode-label" id="scanModeLabel"></div>
    <div class="scan-input-row">
      <input class="scan-input" id="scanInput" type="text" placeholder="QRコードをスキャンしてください" autocomplete="off" />
      <button class="submit-btn" id="submitBtn" onclick="submitManual()">送信</button>
    </div>
    <div class="scan-toast" id="scanToast"></div>
  </div>

  <div class="tabs">
    <div class="tab pending-tab active" id="tab-pending" onclick="switchTab('pending')">呼出中 <span class="tab-badge" id="badge-pending">6</span></div>
    <div class="tab done-tab" id="tab-done" onclick="switchTab('done')">完了 <span class="tab-badge" id="badge-done">0</span></div>
    <div class="tab error-tab" id="tab-error" onclick="switchTab('error')">エラー <span class="tab-badge" id="badge-error">0</span></div>
  </div>
  <div class="tab-content active" id="content-pending"><div class="orders-grid" id="orderList"></div></div>
  <div class="tab-content" id="content-done"><div class="orders-grid" id="doneList"></div></div>
  <div class="tab-content" id="content-error">
    <div id="errorActions" style="display:none;"><button class="clear-btn" onclick="clearAllErrors()">すべて消去</button></div>
    <div class="error-list" id="errorList"></div>
  </div>
  <div class="offline-bar" id="offlineBar">
    <div class="offline-bar-text" id="offlineBarText"></div>
    <div class="offline-bar-sub" id="offlineBarSub"></div>
  </div>
  <div class="flush-result" id="flushResult"></div>
</div>

<script src="./app.js"></script>
</body>
</html>
